<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">


</head>

<body>

    <div class="container">
        <h2>Basic Progress bar</h2>
        <p>To create a default progress bar, add a .progress class to a container element and add the progress-bar class to see to its child element. Use the CSS width property to set the width of the progress bar:</p>
        <div class="progress">
            <div class="progress-bar" style="width:70%">70%</div>
        </div>
    </div>
</body>
</html>
