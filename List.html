<!DOCTYPE html>
<html>
    <head>
        <title>Lists</title>
    </head>
    <body>
        <h1>Ordered list</h1>
        <ol>
            <li>Name</li>
            <li>Place</li>
        </ol>
        <h1>Unordered list</h1>
        <ul>
            <li>Name</li>
            <li>Place</li>
        </ul>
        <h1>Description list</h1>
        <dl>
            <dt>Name</dt>
            <dt>Nmae</dt>
        </dl>
    </body>
</html>
